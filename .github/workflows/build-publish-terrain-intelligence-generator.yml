name: Build and Publish Terrain Intelligence Generator

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - 'v*'
    paths:
      - 'terrain-intelligence-generator/docker/Dockerfile'
      - '.github/workflows/build-publish-terrain-intelligence-generator.yml'
  pull_request:
    branches:
      - main
      - master
      - develop
    paths:
      - 'terrain-intelligence-generator/docker/Dockerfile'
      - '.github/workflows/build-publish-terrain-intelligence-generator.yml'
  workflow_dispatch:
    inputs:
      vicar_version:
        description: 'VICAR version to build (GitHub release tag)'
        required: false
        default: '5.0'
      external_version:
        description: 'VICAR externals version'
        required: false
        default: '5.0'
      push_to_registry:
        description: 'Push to GitHub Container Registry'
        required: false
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/terrain-intelligence-generator

jobs:
  build-and-push:
    name: Build and Push Terrain Intelligence Generator
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h
          echo ""
          
          # Remove unnecessary pre-installed software
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          
          # Clean up docker
          docker system prune -af --volumes
          
          echo ""
          echo "Disk space after cleanup:"
          df -h
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag with branch name for branch pushes
            type=ref,event=branch
            # Tag with PR number for pull requests
            type=ref,event=pr
            # Tag with semantic version for tags
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Tag with 'latest' for main branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag with 'opensource' as a stable identifier
            type=raw,value=opensource
            # Tag with short commit SHA
            type=sha,prefix=sha-,format=short
      
      - name: Determine build arguments
        id: build-args
        run: |
          # Use workflow inputs if provided, otherwise use defaults
          VICAR_VERSION="${{ github.event.inputs.vicar_version }}"
          EXTERNAL_VERSION="${{ github.event.inputs.external_version }}"
          
          # If not provided, use defaults (5.0 release for pre-built binaries)
          VICAR_VERSION="${VICAR_VERSION:-5.0}"
          EXTERNAL_VERSION="${EXTERNAL_VERSION:-5.0}"
          
          echo "vicar_version=${VICAR_VERSION}" >> $GITHUB_OUTPUT
          echo "external_version=${EXTERNAL_VERSION}" >> $GITHUB_OUTPUT
          
          echo "Building with:"
          echo "  VICAR version: ${VICAR_VERSION}"
          echo "  Externals version: ${EXTERNAL_VERSION}"
          echo "  Build method: Pre-built binaries from GitHub releases"
      
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./terrain-intelligence-generator
          file: ./terrain-intelligence-generator/docker/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' && (github.event.inputs.push_to_registry != 'false') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VICAR_VERSION=${{ steps.build-args.outputs.vicar_version }}
            EXTERNAL_VERSION=${{ steps.build-args.outputs.external_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: ${{ github.event_name == 'pull_request' && 'type=cacheonly' || '' }}
      
      - name: Generate build summary
        if: always()
        run: |
          echo "## Terrain Intelligence Generator Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Information:**" >> $GITHUB_STEP_SUMMARY
          echo "- Repository: \`${{ github.repository }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Branch/Tag: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- VICAR Version: \`${{ steps.build-args.outputs.vicar_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Externals Version: \`${{ steps.build-args.outputs.external_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "**Test Results:**" >> $GITHUB_STEP_SUMMARY
            echo "✅ 15 comprehensive tests executed" >> $GITHUB_STEP_SUMMARY
            echo "- Container startup and environment" >> $GITHUB_STEP_SUMMARY
            echo "- Directory structure verification (flattening)" >> $GITHUB_STEP_SUMMARY
            echo "- Wrapper scripts (545 commands)" >> $GITHUB_STEP_SUMMARY
            echo "- VICAR operations (gen, list, copy, stretch)" >> $GITHUB_STEP_SUMMARY
            echo "- vicario converter (PNG, JPEG, TIFF)" >> $GITHUB_STEP_SUMMARY
            echo "- VISOR sample data access" >> $GITHUB_STEP_SUMMARY
            echo "- Python/Pillow dependencies" >> $GITHUB_STEP_SUMMARY
            echo "- Docker exec pattern (terrain-intelligence-generator)" >> $GITHUB_STEP_SUMMARY
            echo "- File persistence to host" >> $GITHUB_STEP_SUMMARY
            echo "- MARS commands (345 programs)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "**Image Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "**Pull the image:**" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:opensource" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Run the container:**" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "docker run -it --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:opensource bash" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Note:** Image was built successfully but not pushed (pull request)." >> $GITHUB_STEP_SUMMARY
            echo "Tests are skipped for PRs to conserve disk space. The image will be tested when merged." >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Run comprehensive tests
        if: success() && github.event_name != 'pull_request'
        run: |
          echo "Running comprehensive tests on built image..."
          
          # Clean up build cache before pulling image for tests
          docker builder prune -af
          
          # Get the first tag from the metadata output
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          
          echo "Testing image: ${IMAGE_TAG}"
          echo ""
          
          # Pull the image from registry
          docker pull ${IMAGE_TAG}
          
          # Create temporary workspace for testing
          TEST_WORKSPACE=$(mktemp -d)
          echo "Created test workspace: ${TEST_WORKSPACE}"
          
          # Test 1: Container startup
          echo "============================================"
          echo "Test 1: Container startup"
          echo "============================================"
          docker run --rm ${IMAGE_TAG} echo "✓ Container started successfully"
          echo ""
          
          # Test 2: Directory structure verification
          echo "============================================"
          echo "Test 2: Directory structure (flattening)"
          echo "============================================"
          docker run --rm ${IMAGE_TAG} bash -c '
            echo "Checking V2TOP structure..."
            if [ -d "$V2TOP/p2/lib/x86-64-linx" ] && [ -d "$V2TOP/tae53/bin" ] && [ -d "$V2TOP/mars/lib/x86-64-linx" ]; then
              echo "✓ Directory structure is correctly flattened"
              echo "  - p2: $(find $V2TOP/p2/lib/x86-64-linx -type f -executable 2>/dev/null | wc -l) programs"
              echo "  - tae53: $(find $V2TOP/tae53/bin -type f -executable 2>/dev/null | wc -l) programs"
              echo "  - mars: $(find $V2TOP/mars/lib/x86-64-linx -type f -executable 2>/dev/null | wc -l) programs"
            else
              echo "✗ ERROR: Expected directory structure not found"
              exit 1
            fi
          '
          echo ""
          
          # Test 3: Environment variables
          echo "============================================"
          echo "Test 3: Environment variables"
          echo "============================================"
          docker run --rm ${IMAGE_TAG} bash -c '
            echo "V2TOP=$V2TOP"
            echo "WORKSPACE=$WORKSPACE"
            echo "VICSYS=$VICSYS"
            echo "VISOR_CALIB=$VISOR_CALIB"
            echo "VISOR_SAMPLES=$VISOR_SAMPLES"
            
            # Verify required environment variables are set
            if [ -z "$V2TOP" ] || [ -z "$WORKSPACE" ] || [ -z "$VICSYS" ]; then
              echo "✗ ERROR: Required environment variables not set"
              exit 1
            fi
            echo "✓ All environment variables set correctly"
          '
          echo ""
          
          # Test 4: Wrapper scripts
          echo "============================================"
          echo "Test 4: Wrapper scripts"
          echo "============================================"
          docker run --rm ${IMAGE_TAG} bash -c '
            WRAPPER_COUNT=$(ls -1 /usr/local/bin | wc -l)
            echo "Total wrapper scripts: $WRAPPER_COUNT"
            
            # Check for key commands
            for cmd in gen list copy stretch marsmap marsmos vicario; do
              if [ -x "/usr/local/bin/$cmd" ]; then
                echo "✓ $cmd wrapper exists"
              else
                echo "✗ ERROR: $cmd wrapper not found"
                exit 1
              fi
            done
            
            # Verify wrapper script format
            if grep -q "export V2TOP" /usr/local/bin/gen && grep -q "export LD_LIBRARY_PATH" /usr/local/bin/gen; then
              echo "✓ Wrapper scripts have correct format"
            else
              echo "✗ ERROR: Wrapper scripts missing required exports"
              exit 1
            fi
          '
          echo ""
          
          # Test 5: Generate test image
          echo "============================================"
          echo "Test 5: Generate test image (gen command)"
          echo "============================================"
          docker run --rm -v ${TEST_WORKSPACE}:/workspace:Z ${IMAGE_TAG} bash -c '
            gen /workspace/test.vic 256 256
            if [ -f /workspace/test.vic ]; then
              SIZE=$(stat -f%z /workspace/test.vic 2>/dev/null || stat -c%s /workspace/test.vic 2>/dev/null)
              echo "✓ Generated test.vic ($SIZE bytes)"
            else
              echo "✗ ERROR: Failed to generate test image"
              exit 1
            fi
          '
          echo ""
          
          # Test 6: List image contents
          echo "============================================"
          echo "Test 6: List image contents (list command)"
          echo "============================================"
          docker run --rm -v ${TEST_WORKSPACE}:/workspace:Z ${IMAGE_TAG} bash -c '
            list /workspace/test.vic | head -15
            if [ $? -eq 0 ]; then
              echo "✓ List command successful"
            else
              echo "✗ ERROR: List command failed"
              exit 1
            fi
          '
          echo ""
          
          # Test 7: Copy operation
          echo "============================================"
          echo "Test 7: Copy image (copy command)"
          echo "============================================"
          docker run --rm -v ${TEST_WORKSPACE}:/workspace:Z ${IMAGE_TAG} bash -c '
            copy /workspace/test.vic /workspace/test_copy.vic
            if [ -f /workspace/test_copy.vic ]; then
              echo "✓ Copy command successful"
            else
              echo "✗ ERROR: Copy command failed"
              exit 1
            fi
          '
          echo ""
          
          # Test 8: Stretch operation
          echo "============================================"
          echo "Test 8: Stretch image (stretch command)"
          echo "============================================"
          docker run --rm -v ${TEST_WORKSPACE}:/workspace:Z ${IMAGE_TAG} bash -c '
            stretch /workspace/test.vic /workspace/stretched.vic
            if [ -f /workspace/stretched.vic ]; then
              echo "✓ Stretch command successful"
            else
              echo "✗ ERROR: Stretch command failed"
              exit 1
            fi
          '
          echo ""
          
          # Test 9: vicario converter (PNG)
          echo "============================================"
          echo "Test 9: vicario converter (VICAR to PNG)"
          echo "============================================"
          docker run --rm -v ${TEST_WORKSPACE}:/workspace:Z ${IMAGE_TAG} bash -c '
            vicario /workspace/test.vic /workspace/test.png
            if [ -f /workspace/test.png ]; then
              echo "✓ PNG conversion successful"
            else
              echo "✗ ERROR: PNG conversion failed"
              exit 1
            fi
          '
          echo ""
          
          # Test 10: vicario converter (JPEG)
          echo "============================================"
          echo "Test 10: vicario converter (VICAR to JPEG)"
          echo "============================================"
          docker run --rm -v ${TEST_WORKSPACE}:/workspace:Z ${IMAGE_TAG} bash -c '
            vicario /workspace/test.vic /workspace/test.jpg
            if [ -f /workspace/test.jpg ]; then
              echo "✓ JPEG conversion successful"
            else
              echo "✗ ERROR: JPEG conversion failed"
              exit 1
            fi
          '
          echo ""
          
          # Test 11: VISOR sample data access
          echo "============================================"
          echo "Test 11: VISOR sample data"
          echo "============================================"
          docker run --rm ${IMAGE_TAG} bash -c '
            if [ -d "$VISOR_SAMPLES" ]; then
              SAMPLE_COUNT=$(find $VISOR_SAMPLES -type f 2>/dev/null | wc -l)
              echo "✓ VISOR sample data accessible ($SAMPLE_COUNT files)"
            else
              echo "✗ ERROR: VISOR sample data not found"
              exit 1
            fi
            
            if [ -d "$VISOR_CALIB" ]; then
              CALIB_COUNT=$(find $VISOR_CALIB -type f 2>/dev/null | wc -l)
              echo "✓ VISOR calibration data accessible ($CALIB_COUNT files)"
            else
              echo "✗ ERROR: VISOR calibration data not found"
              exit 1
            fi
          '
          echo ""
          
          # Test 12: Python and dependencies
          echo "============================================"
          echo "Test 12: Python and dependencies"
          echo "============================================"
          docker run --rm ${IMAGE_TAG} bash -c '
            python3 --version
            python3 -c "import PIL; print(f\"Pillow {PIL.__version__}\")"
            if [ $? -eq 0 ]; then
              echo "✓ Python and Pillow available"
            else
              echo "✗ ERROR: Python dependencies missing"
              exit 1
            fi
          '
          echo ""
          
          # Test 13: Docker exec pattern (vicar-native-toolkit simulation)
          echo "============================================"
          echo "Test 13: Docker exec pattern (long-running container)"
          echo "============================================"
          docker run -d --name vicar-test-container -v ${TEST_WORKSPACE}:/workspace:Z ${IMAGE_TAG} tail -f /dev/null
          sleep 2
          
          docker exec vicar-test-container gen /workspace/exec_test.vic 128 128
          docker exec vicar-test-container list /workspace/exec_test.vic | head -10
          docker exec vicar-test-container vicario /workspace/exec_test.vic /workspace/exec_test.png
          
          if docker exec vicar-test-container test -f /workspace/exec_test.png; then
            echo "✓ Docker exec pattern works correctly"
          else
            echo "✗ ERROR: Docker exec pattern failed"
            docker stop vicar-test-container
            docker rm vicar-test-container
            exit 1
          fi
          
          docker stop vicar-test-container
          docker rm vicar-test-container
          echo ""
          
          # Test 14: File persistence verification
          echo "============================================"
          echo "Test 14: File persistence to host"
          echo "============================================"
          echo "Files created in test workspace:"
          ls -lh ${TEST_WORKSPACE}
          
          # Verify all expected files exist
          EXPECTED_FILES="test.vic test_copy.vic stretched.vic test.png test.jpg exec_test.vic exec_test.png"
          ALL_FOUND=true
          for file in $EXPECTED_FILES; do
            if [ -f "${TEST_WORKSPACE}/${file}" ]; then
              echo "✓ ${file} exists on host"
            else
              echo "✗ ERROR: ${file} not found on host"
              ALL_FOUND=false
            fi
          done
          
          if [ "$ALL_FOUND" = false ]; then
            exit 1
          fi
          echo ""
          
          # Test 15: MARS commands availability
          echo "============================================"
          echo "Test 15: MARS commands availability"
          echo "============================================"
          docker run --rm ${IMAGE_TAG} bash -c '
            MARS_COUNT=$(ls /usr/local/bin | grep -c "^mars")
            echo "MARS commands available: $MARS_COUNT"
            
            # Check for key MARS commands
            for cmd in marsmap marsmos marsautotie marscor3; do
              if [ -x "/usr/local/bin/$cmd" ]; then
                echo "✓ $cmd available"
              else
                echo "✗ ERROR: $cmd not found"
                exit 1
              fi
            done
          '
          echo ""
          
          # Cleanup
          rm -rf ${TEST_WORKSPACE}
          echo "============================================"
          echo "✅ ALL TESTS PASSED"
          echo "============================================"

  # Optional: Create GitHub Release for tagged versions
  create-release:
    name: Create GitHub Release
    needs: build-and-push
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Create Release Notes
        id: release-notes
        run: |
          cat > release-notes.md << 'EOF'
          ## Terrain Intelligence Generator - Open Source Edition
          
          This release provides a containerized version of the VICAR-based terrain intelligence generation system built from pre-built binaries distributed via GitHub releases.
          
          ### What's Included
          - VICAR image processing tools (pre-built binaries)
          - TAE (Terminal Application Executive)
          - MARS terrain processing tools
          - Python 3.9 runtime
          - Vicario - VICAR to PNG/JPEG/TIFF converter
          - VISOR calibration files (Phoenix, MER missions)
          - VISOR sample data for testing
          - All necessary runtime dependencies
          
          ### Quick Start
          
          **Pull the image:**
          ```bash
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          ```
          
          **Run interactively:**
          ```bash
          docker run -it --rm \
            -v $(pwd)/workspace:/workspace \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            bash
          ```
          
          **Test VICAR commands:**
          ```bash
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} label --help
          ```
          
          **Convert VICAR images:**
          ```bash
          docker run --rm -v $(pwd):/workspace \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            vicario input.vic output.png
          ```
          
          ### Available Tags
          - `${{ github.ref_name }}` - This specific version
          - `opensource` - Latest open-source build
          - `latest` - Latest stable release
          
          ### Data Locations Inside Container
          - VISOR calibrations: `/usr/local/vicar/visor_data/calib`
          - VISOR sample data: `/usr/local/vicar/visor_data/samples`
          
          ### Source Code
          - VICAR: https://github.com/NASA-AMMOS/VICAR
          - Pre-built binaries from release: ${{ github.event.inputs.vicar_version || '5.0' }}
          - Built from commit: ${{ github.sha }}
          
          ### Documentation
          See the [terrain-intelligence-generator README](terrain-intelligence-generator/README.md) for detailed usage instructions.
          EOF
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
